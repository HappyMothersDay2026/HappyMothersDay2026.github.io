<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Much Do You Know About Your Mother?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fed7e2 100%);
            min-height: 100vh;
        }
        .cursive {
            font-family: 'Dancing Script', cursive;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background: #ed64a6;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #d53f8c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(213, 63, 140, 0.3);
        }
        .option-btn {
            border: 2px solid #fbb6ce;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            background: #fff5f5;
            border-color: #ed64a6;
        }
        .option-btn.selected {
            background: #ed64a6;
            color: white;
            border-color: #ed64a6;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Background Elements -->
    <div class="floating-hearts" id="hearts-container"></div>

    <div class="w-full max-w-lg">
        <!-- Start Page -->
        <div id="start-screen" class="glass-card p-8 text-center fade-in">
            <h1 class="text-4xl md:text-5xl font-bold text-pink-600 mb-4 cursive">Happy Mother's Day!</h1>
            <h2 class="text-xl text-gray-700 mb-8 text-balance">How much do you actually know about your mother?</h2>
            
            <div class="mb-6 text-left">
                <label for="player-name" class="block text-sm font-semibold text-gray-600 mb-2">Enter Your Name</label>
                <input type="text" id="player-name" placeholder="Your name..." 
                    class="w-full px-4 py-3 rounded-xl border-2 border-pink-100 focus:border-pink-400 outline-none transition-colors">
            </div>
            
            <button onclick="startQuiz()" class="btn-primary text-white font-bold py-3 px-10 rounded-full text-lg">
                Let's Play!
            </button>
        </div>

        <!-- Quiz Page -->
        <div id="quiz-screen" class="glass-card p-8 hidden fade-in">
            <div class="flex justify-between items-center mb-6">
                <span id="progress-text" class="text-pink-500 font-bold text-sm">Question 1 of 13</span>
                <div class="w-24 h-2 bg-pink-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-pink-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            
            <h3 id="question-text" class="text-2xl font-bold text-gray-800 mb-6"></h3>
            
            <div id="options-container" class="space-y-3">
                <!-- Options will be injected here -->
            </div>

            <div class="mt-8 flex justify-end">
                <button id="next-btn" onclick="handleNext()" disabled 
                    class="bg-gray-300 text-white font-bold py-2 px-8 rounded-full cursor-not-allowed transition-all">
                    Next
                </button>
            </div>
        </div>

        <!-- Results Page -->
        <div id="results-screen" class="glass-card p-8 text-center hidden fade-in">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold text-pink-600 mb-2 cursive">Quiz Complete!</h2>
            <p id="result-message" class="text-gray-700 text-lg mb-6 px-4"></p>
            
            <div class="bg-pink-50 rounded-2xl p-6 mb-8">
                <div class="text-sm uppercase tracking-widest text-pink-400 font-bold mb-1">Final Score</div>
                <div id="final-score" class="text-5xl font-bold text-pink-600">0/13</div>
            </div>

            <div class="space-y-4">
                <button onclick="location.reload()" class="btn-primary text-white font-bold py-3 px-10 rounded-full w-full">
                    Try Again
                </button>
                <p class="text-xs text-gray-400 mt-4 italic">Give your mom a hug after this!</p>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What is your mother's favorite flower?",
                options: ["Rose", "Lily", "Tulip", "Daisy"],
                answer: 0
            },
            {
                question: "What is her absolute favorite comfort food?",
                options: ["Pasta", "Chocolate", "Soup", "Something she cooks herself"],
                answer: 3
            },
            {
                question: "Which of these is her dream vacation spot?",
                options: ["Busy city", "Quiet beach", "Mountain cabin", "Luxury cruise"],
                answer: 1
            },
            {
                question: "What is her favorite hobby when she has a free hour?",
                options: ["Reading", "Gardening", "Napping", "Watching her favorite show"],
                answer: 1
            },
            {
                question: "How does she take her morning coffee or tea?",
                options: ["Black/Plain", "With lots of sugar", "With a splash of milk", "She doesn't drink either"],
                answer: 2
            },
            {
                question: "What was her favorite subject back in school?",
                options: ["English", "Math/Science", "History", "Art/Music"],
                answer: 0
            },
            {
                question: "What is the one chore she secretly dislikes the most?",
                options: ["Doing dishes", "Laundry", "Grocery shopping", "Cleaning the bathroom"],
                answer: 0
            },
            {
                question: "Which music genre is she most likely to blast in the car?",
                options: ["80s Classics", "Modern Pop", "Country", "Classical or Jazz"],
                answer: 2
            },
            {
                question: "What is her 'hidden talent'?",
                options: ["Singing", "Extreme Organization", "Advice-giving", "Master Chef skills"],
                answer: 3
            },
            {
                question: "What is her favorite color?",
                options: ["Blue/Teal", "Pink/Red", "Yellow/Orange", "Purple/Lavender"],
                answer: 1
            },
            {
                question: "What kind of movies does she prefer?",
                options: ["Rom-Coms", "Thrillers/Mysteries", "Documentaries", "Period Dramas"],
                answer: 1
            },
            {
                question: "If she could have any superpower, what would it be?",
                options: ["Teleportation", "Reading minds", "Stopping time", "Healing"],
                answer: 3
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let playerName = "";
        let selectedOption = null;

        function startQuiz() {
            const nameInput = document.getElementById('player-name');
            if (!nameInput.value.trim()) {
                const errorBox = document.createElement('div');
                errorBox.className = "text-red-500 text-sm mt-2 font-bold";
                errorBox.innerText = "Please enter your name!";
                if(!nameInput.nextSibling || nameInput.nextSibling.innerText !== errorBox.innerText) {
                    nameInput.parentNode.appendChild(errorBox);
                }
                return;
            }
            playerName = nameInput.value.trim();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = quizData[currentQuestion];
            selectedOption = null;
            
            document.getElementById('progress-text').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl font-semibold text-gray-700 transition-all';
                btn.innerText = option;
                btn.onclick = () => selectOption(btn, index);
                optionsContainer.appendChild(btn);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.classList.remove('btn-primary');
            nextBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
        }

        function selectOption(element, index) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.classList.remove('selected'));
            
            element.classList.add('selected');
            selectedOption = index;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.classList.add('btn-primary');
            nextBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
        }

        function handleNext() {
            if (selectedOption === quizData[currentQuestion].answer) {
                score++;
            }
            
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            
            const resultMsg = document.getElementById('result-message');
            const finalScoreElem = document.getElementById('final-score');
            
            finalScoreElem.innerText = `${score}/${quizData.length}`;
            
            let message = "";
            const percentage = (score / quizData.length) * 100;
            
            if (percentage === 100) {
                message = `Incredible, ${playerName}! You know your mother perfectly. You two must be very close!`;
            } else if (percentage >= 70) {
                message = `Well done, ${playerName}! You know your mother quite well. She'll be impressed!`;
            } else if (percentage >= 40) {
                message = `Good effort, ${playerName}! You know a fair bit, but maybe it's time for a long chat with Mom.`;
            } else {
                message = `Nice try, ${playerName}! Mother's Day is the perfect time to learn more about the amazing woman she is.`;
            }
            
            resultMsg.innerText = message;
        }

        function createHearts() {
            const container = document.getElementById('hearts-container');
            const heartIcons = ['❤️', '🌸', '💖', '✨'];
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.opacity = Math.random() * 0.4;
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(heart);
            }
        }

        window.onload = createHearts;
    </script>
</body>
</html>
